<!doctype html>
<html lang="es" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- The two notranslate hints below are the fix for a class of crashes
         we saw on Android Chrome ("Failed to execute 'removeChild' on
         'Node'..."): Chrome auto-translates the page in the background,
         which mutates the DOM under React's feet. When React then tries
         to remove a node it owned (e.g. unmounting a Toaster, dismissing
         a Sonner toast, closing a Select dropdown) the node is no longer
         where React parked it and the whole subtree throws into the
         ErrorBoundary, which is what made the user see the black "Error
         al cargar la página" screen on mobile.
         Combining `translate="no"` on <html>, the meta below, AND the
         `notranslate` class on <body> gives us belt-and-suspenders
         coverage across browsers — Chrome, Edge, and Yandex respect at
         least one of them. -->
    <meta name="google" content="notranslate" />
    <title>MJA CRM</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FFC233" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MJA CRM" />
  </head>
  <body class="notranslate">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Auto-recovery: if this app ever had a service worker installed (it
      // shouldn't), unregister it and clear all caches immediately — before
      // React even boots. Stale SWs intercept requests and serve old cached
      // JS bundles or 403s, causing login failures that only work in incognito.
      // This runs synchronously on every page load; if there are no SWs it's
      // a no-op. Users never see anything — it just silently cleans up.
      (function() {
        if (!('serviceWorker' in navigator)) return;

        navigator.serviceWorker.getRegistrations().then(function(regs) {
          if (regs.length === 0) return; // nothing to do
          // There's a SW installed — unregister all of them and clear caches,
          // then force a hard reload so the page loads fresh without any SW.
          return Promise.all(regs.map(function(r) { return r.unregister(); }))
            .then(function() { return caches.keys(); })
            .then(function(names) {
              return Promise.all(names.map(function(n) { return caches.delete(n); }));
            })
            .then(function() {
              // Hard reload — bypasses any in-memory cache
              window.location.reload(true);
            });
        });

        // Also catch any JS module load errors caused by stale SW serving
        // wrong MIME types. If a script tag fails to load, force a clean reload.
        window.addEventListener('error', function(e) {
          if (e && e.message && e.message.includes('MIME')) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              return Promise.all(regs.map(function(r) { return r.unregister(); }));
            }).then(function() {
              return caches.keys().then(function(names) {
                return Promise.all(names.map(function(n) { return caches.delete(n); }));
              });
            }).then(function() {
              window.location.reload(true);
            });
          }
        }, true);
      })();
    </script>
  </body>
</html>
