<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reiniciando...</title>
  <style>
    body { background:#09090b; color:#fafafa; font-family:system-ui,sans-serif;
           display:flex; flex-direction:column; align-items:center; justify-content:center;
           min-height:100vh; margin:0; text-align:center; padding:24px; }
    h1  { font-size:1.5rem; margin-bottom:8px; }
    p   { color:#a1a1aa; font-size:0.9rem; margin-bottom:24px; }
    .ok { color:#22c55e; font-weight:600; font-size:1.1rem; }
    .spinner { width:40px; height:40px; border:3px solid #333; border-top-color:#FFC233;
               border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:20px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>Limpiando caché...</h1>
  <p id="status">Desregistrando Service Workers...</p>

  <script>
    const status = document.getElementById('status');
    async function reset() {
      try {
        // 1. Unregister all service workers
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        status.textContent = 'Borrando cachés...';

        // 2. Delete all caches
        if ('caches' in window) {
          const names = await caches.keys();
          await Promise.all(names.map(n => caches.delete(n)));
        }
        status.textContent = 'Limpiando almacenamiento local...';

        // 3. Clear localStorage (except auth tokens which live in cookies/indexedDB)
        try { localStorage.clear(); } catch(e) {}

        status.innerHTML = '<span class="ok">✓ Listo. Redirigiendo al login...</span>';
        setTimeout(() => { window.location.href = '/login'; }, 1500);
      } catch(err) {
        status.textContent = 'Error: ' + err.message + '. Intentá cerrar y abrir la app.';
      }
    }
    reset();
  </script>
</body>
</html>
